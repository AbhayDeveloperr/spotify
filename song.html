<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" type="image/x-icon" href="src/Images/logo-withoutBG.png">
     <link rel="stylesheet" href="src/css/output.css">
    <title>Song Preview Test</title>
</head>
<body>
    <h1>Arijit singh song</h1>
    <form id="search-form" action="">
        <input type="text" id="search-input" placeholder="Search for a song,artist..">
        <button type="submit">submit</button>
    </form>
    <div id="song-list">

    </div>

    <template id="song-template">
        <div class="song-card" style="border: 1px solid black; margin: 10px; padding: 10px;">
            <h3 class="song-title">Ashish</h3>
            <img class="song-artwork" src="" alt="artwork">
            <br><br>
            <audio controls class="song-audio">
                Your browser does not support the audio element.
            </audio>
        </div>
    </template>

    <script>
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const search = searchInput.value.trim();
            if (search) {
                document.getElementById('song-list').innerHTML = '';
                fetchSongs(search);
            }
        });

        async function fetchSongs(search) {
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(search)}&media=music&entity=song&limit=5`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                console.log(data);
                
                const songList = document.getElementById('song-list');
                const template = document.getElementById('song-template');

                if (data.results.length === 0) {
                    songList.innerHTML = '<p>No songs found</p>';
                    return;
                }

                data.results.forEach((song, index) => {
                    const clone = template.content.cloneNode(true);
                    
                    clone.querySelector('.song-title').textContent = `${index+1}. ${song.trackName}`;
                    clone.querySelector('.song-artwork').src = song.artworkUrl100;
                    clone.querySelector('.song-audio').src = song.previewUrl;

                    songList.appendChild(clone);
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('song-list').innerHTML = '<p>Error fetching songs</p>';
            }
        }

        const artist = "Arijit";
        fetchSongs(artist);
    </script>
</body>
</html>
