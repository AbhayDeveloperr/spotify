    <script>
        // Get song ID
        const songId = new URLSearchParams(window.location.search).get('id');

        // Elements
        const audio = document.getElementById('main-audio');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const bar = document.getElementById('progress-bar');
        const container = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const playingGif = document.getElementById('playing-gif');

        // Load song
        async function loadSong(id) {
            let res = await fetch(`https://itunes.apple.com/lookup?id=${id}`);
            let data = await res.json();

            if (data.results.length) {
                let s = data.results[0];

                document.getElementById('song-name').innerText = s.trackName;
                document.getElementById('song-artist').innerText = s.artistName;
                document.getElementById('song-artwork').src = s.artworkUrl100.replace('100x100bb','175x175bb');

                audio.src = s.previewUrl;
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'inline';
            }
        }

        // Play / Pause
        playIcon.addEventListener('click',()=>{
            if(audio.paused || audio.currentTime<=0){
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'inline';
            }
        });
        pauseIcon.addEventListener('click',()=>{
            if(!audio.paused){
                audio.pause();
                playIcon.style.display = 'inline';
                pauseIcon.style.display = 'none';

            }
        });
        // Progress + Timer update
        audio.ontimeupdate = () => {
            // Progress bar
            bar.style.width = (audio.currentTime / audio.duration) * 100 + "%";

            // Current time
            currentTimeEl.innerText = format(audio.currentTime);
        };

        // Duration set
        audio.onloadedmetadata = () => {
            durationEl.innerText = format(audio.duration);
        };

        // Seek
        container.onclick = (e) => {
            audio.currentTime = (e.offsetX / container.clientWidth) * audio.duration;
        };

        // Format time (simple)
        function format(sec) {
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        // Load song
        if (songId) loadSong(songId);
        setRandomBackground();

        //Random Background
        function setRandomBackground() {
            const colors = [
                "#F7F6E5",
                "#FFE4E1",
                "#E0F7FA",
                "#E8F5E9",
                "#FFF3E0",
                "#E3F2FD",
                "#FCE4EC",
                "#F3E5F5",
                "#EDE7F6"
            ];

            let randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.background = randomColor;
        }


        //Wishlist ko implement
        document.getElementById('wishlist-single').onclick = () => {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

            let already = wishlist.find(item => item.id === songId);

            let heart = document.querySelector('#wishlist-single path'); // ✅ yaha define karo

            if (already) {
                removeSong(songId);
                heart.setAttribute('fill','none');
                return;
            }

            wishlist.push({
                id: songId,
                name: document.getElementById('song-name').innerText,
                artist: document.getElementById('song-artist').innerText,
                img: document.getElementById('song-artwork').src
            });

            localStorage.setItem('wishlist', JSON.stringify(wishlist));

            heart.setAttribute('fill', 'red');
        };

        //Check Wishlist
        function checkWishlist() {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

            let already = wishlist.find(item => item.id === songId);

            let heart = document.querySelector('#wishlist-single path');

            if (already) {
                heart.setAttribute('fill', 'red');
            } else {
                heart.setAttribute('fill', 'none'); // ya black
            }
        };
        checkWishlist();

        //remove song from wishlist
        function removeSong(songId) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

            wishlist = wishlist.filter(item => item.id !== songId);

            localStorage.setItem('wishlist', JSON.stringify(wishlist));
        }
        
        //loop 
        let isLoop = false;

        const loopBtn = document.getElementById('loop-btn');
        loopBtn.onclick = () => {
            isLoop = !isLoop;         //toggle
            if (isLoop) {
                audio.loop = true;
                loopBtn.style.fill = "blue"; // active color
            } else {
                audio.loop = false;
                loopBtn.style.fill = "black"; // normal color
                }
            };
            audio.loop = true;
                    
    </script>
