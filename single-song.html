<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="src/Images/logo-withoutBG.png" type="image/x-icon">
    <title>Document</title>
    <link rel="stylesheet" href="src/css/output.css">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="bg-[#F5F5F5] pb-32">
    <div>
        <svg onclick="window.history.back()" width="25px" height="25px" viewBox="0 0 1024 1024" fill="#000000" class="icon cursor-pointer m-4" version="1.1" xmlns="http://www.w3.org/2000/svg">
            <path d="M669.6 849.6c8.8 8 22.4 7.2 30.4-1.6s7.2-22.4-1.6-30.4l-309.6-280c-8-7.2-8-17.6 0-24.8l309.6-270.4c8.8-8 9.6-21.6 2.4-30.4-8-8.8-21.6-9.6-30.4-2.4L360.8 480.8c-27.2 24-28 64-0.8 88.8l309.6 280z" fill="" />
        </svg>
        <div class="flex justify-center py-10 text-gray-600 tracking-wider">
            <p>Now Playing</p>
        </div>
        <div class="flex justify-center">
            <img id="song-artwork" src="https://placehold.co/300x300" class="rounded-3xl shadow-2xl w-72 h-72 object-cover" alt="">
        </div>
        <div class="flex justify-center pt-4">
            <p id="song-name" class="font-bold text-2xl text-center px-4">Song Name</p>
        </div>
        <div class="flex justify-center">
            <p id="song-artist" class="text-lg text-gray-500">Artist Name</p>
        </div>
    </div>
    <div class="px-8 pt-8">
        <div class="relative w-full h-1 bg-gray-300 rounded-full cursor-pointer" id="progress-container">
            <div class="absolute top-0 left-0 h-full bg-blue-600 rounded-full" id="progress-bar" style="width: 0%"></div>
        </div>
        <div class="flex justify-between text-xs text-gray-500 pt-2">
            <p id="current-time">0:00</p>
            <p id="duration">0:30</p>
        </div>
    </div>

    <div class="flex justify-center py-8 gap-8 items-center">
        <!-- Previous Button -->
        <svg width="30px" height="30px" viewBox="0 0 24 24" fill="none" class="cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
            <path d="M18.4142 6C18.1581 6 17.9125 6.10184 17.7314 6.2829L12 12.0143L6.26863 6.2829C6.08754 6.10184 5.84191 6 5.58579 6C5.0335 6 4.58579 6.44772 4.58579 7C4.58579 7.26522 4.69114 7.51957 4.87868 7.70711L11.3071 14.1355C11.6976 14.526 12.3308 14.526 12.7213 14.1355L19.1497 7.70711C19.3373 7.51957 19.4426 7.26522 19.4426 7C19.4426 6.44772 18.9949 6 18.4142 6Z" fill="currentColor" transform="rotate(90 12 12)"/>
        </svg>
        
        <!-- Play/Pause Button -->
        <div id="play-pause-btn" class="bg-white w-16 h-16 flex items-center justify-center rounded-full shadow-xl border border-gray-100 cursor-pointer transform hover:scale-110 active:scale-95 transition-all">
            <svg id="play-icon" width="32px" height="32px" viewBox="0 0 24 24" fill="#2563EB" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 5V19L19 12L8 5Z" fill="#2563EB"/>
            </svg>
            <svg id="pause-icon" class="hidden" width="32px" height="32px" viewBox="0 0 24 24" fill="#2563EB" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 19H10V5H6V19ZM14 5V19H18V5H14Z" fill="#2563EB"/>
            </svg>
        </div>

        <!-- Next Button -->
        <svg width="30px" height="30px" viewBox="0 0 24 24" fill="none" class="cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
            <path d="M18.4142 6C18.1581 6 17.9125 6.10184 17.7314 6.2829L12 12.0143L6.26863 6.2829C6.08754 6.10184 5.84191 6 5.58579 6C5.0335 6 4.58579 6.44772 4.58579 7C4.58579 7.26522 4.69114 7.51957 4.87868 7.70711L11.3071 14.1355C11.6976 14.526 12.3308 14.526 12.7213 14.1355L19.1497 7.70711C19.3373 7.51957 19.4426 7.26522 19.4426 7C19.4426 6.44772 18.9949 6 18.4142 6Z" fill="currentColor" transform="rotate(-90 12 12)"/>
        </svg>
    </div>

    <audio id="main-audio" src=""></audio>

    <div class="fixed bottom-0 w-full bg-[#F5F5F5] border-t border-gray-100">
        <div class="px-5 py-7 flex justify-between">
            <div class="cursor-pointer" onclick="window.location.href='index.html'">
                <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 12.2039V13.725C22 17.6258 22 19.5763 20.8284 20.7881C19.6569 22 17.7712 22 14 22H10C6.22876 22 4.34315 22 3.17157 20.7881C2 19.5763 2 17.6258 2 13.725V12.2039C2 9.91549 2 8.77128 2.5192 7.82274C3.0384 6.87421 3.98695 6.28551 5.88403 5.10813L7.88403 3.86687C9.88939 2.62229 10.8921 2 12 2C13.1079 2 14.1106 2.62229 16.116 3.86687L18.116 5.10812C20.0131 6.28551 20.9616 6.87421 21.4808 7.82274" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="cursor-pointer" onclick="window.location.href='song-list.html'">
                <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7.24 2H5.34C3.15 2 2 3.15 2 5.33V7.23C2 9.41 3.15 10.56 5.33 10.56H7.23C9.41 10.56 10.56 9.41 10.56 7.23V5.33C10.57 3.15 9.42 2 7.24 2Z" fill="#292D32"/>
                </svg>
            </div>
            <div class="cursor-pointer">
                <svg fill="#000000" width="24px" height="24px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="icon line-color"><path d="M21,9c0,8.18-9,12-9,12S3,17.22,3,9A4.79,4.79,0,0,1,7.5,4,4.79,4.79,0,0,1,12,9a4.79,4.79,0,0,1,4.5-5A4.79,4.79,0,0,1,21,9Z" style="fill: none; stroke: rgb(0, 0, 0); stroke-width: 2;"></path></svg>
            </div>
            <div class="cursor-pointer">
                <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 21C5 17.134 8.13401 14 12 14C15.866 14 19 17.134 19 21M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // Use URL parameters to get the unique Song ID
        const urlParams = new URLSearchParams(window.location.search);
        const songId = urlParams.get('id');

        // Elements on the page
        const audioPlayer = document.getElementById('main-audio');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration');

        // Function to fetch song details and start playing
        async function loadSongDetails(id) {
            try {
                const response = await fetch(`https://itunes.apple.com/lookup?id=${id}`);
                const data = await response.json();
                
                if (data.results.length > 0) {
                    const song = data.results[0];
                    
                    // Update text and images
                    document.getElementById('song-name').textContent = song.trackName;
                    document.getElementById('song-artist').textContent = song.artistName;
                    
                    const highResArtwork = song.artworkUrl100.replace('100x100bb', '200x200bb');
                    document.getElementById('song-artwork').src = highResArtwork;
                    
                    // Load and play the audio
                    audioPlayer.src = song.previewUrl;
                    audioPlayer.play().catch(() => console.log("User interaction required to play"));
                    
                    updatePlayerIcons(true); // Song is playing, show play icon
                } else {
                    document.getElementById('song-name').textContent = "Song not found";
                }
            } catch (error) {
                console.error("Error loading song details:", error);
                document.getElementById('song-name').textContent = "Connection Error";
            }
        }

        // Handle Play and Pause button click
        playPauseBtn.onclick = function() {
            if (!audioPlayer.src) return;

            if (audioPlayer.paused) {
                audioPlayer.play();
                updatePlayerIcons(true);
            } else {
                audioPlayer.pause();
                updatePlayerIcons(false);
            }
        };

        // Update the progress bar while the song plays
        audioPlayer.ontimeupdate = function() {
            if (audioPlayer.duration) {
                const percentage = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.style.width = percentage + "%";
                currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
            }
        };

        // Show the total duration once the song data loads
        audioPlayer.onloadedmetadata = function() {
            durationDisplay.textContent = formatTime(audioPlayer.duration);
        };

        // When the song finishes playing
        audioPlayer.onended = function() {
            updatePlayerIcons(false);
        };

        // Skip to different parts of the song by clicking the progress bar
        progressContainer.onclick = function(e) {
            if (audioPlayer.duration) {
                const rect = progressContainer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = progressContainer.clientWidth;
                audioPlayer.currentTime = (clickX / width) * audioPlayer.duration;
            }
        };

        // Helper function to format time (e.g., 0:30)
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return min + ":" + (sec < 10 ? "0" + sec : sec);
        }

        // Switch between icons based on play state
        function updatePlayerIcons(isPlaying) {
            if (isPlaying) {
                // As per request: Show play icon while playing
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            } else {
                // As per request: Show pause icon while paused
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            }
        }

        // Load the song if the ID exists in the URL
        if (songId) {
            loadSongDetails(songId);
        }
    </script>
</body>
</html>
