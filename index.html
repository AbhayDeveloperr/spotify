     <script>
        //search request se hum get request bhejenge song-list.html page par
        document.getElementById('search').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const search = e.target.value.trim();
                window.location.href = `song-list.html?query=${encodeURIComponent(search)}`;
            }
        });
        
        async function fetchSongs(search) {
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(search)}&media=music&entity=song&limit=5`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                console.log(data);
                
                const songList = document.getElementById('song-list');
                const template = document.getElementById('song-template');

                if (data.results.length === 0) {
                    songList.innerHTML = '<p>No songs found</p>';
                    return;
                }

                data.results.forEach((song, index) => {
                    const clone = template.content.cloneNode(true);
                    
                    const artwork = song.artworkUrl100.replace('100x100bb', '600x600bb');
                    clone.querySelector('.song-artwork').src = artwork;
                    clone.querySelector('.song-artwork').onclick = () => {
                        goToPlayer(song.trackId);
                    };
                    songList.appendChild(clone);
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('song-list').innerHTML = '<p>Error fetching songs</p>';
            }
        }

        function goToPlayer(id) {
            window.location.href = `single-song.html?id=${id}`;
        }

        const artist = "Arijit";
        fetchSongs(artist);
    </script>
