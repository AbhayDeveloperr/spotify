<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishList</title>
    <link rel="stylesheet" href="src/css/output.css">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="py-6 px-6">
        <p class="font-bold">Wishlisted Songs</p>
        <div id="song-list" class=" pt-6">
            <div class="song-template" class="flex items-center py-3">
                <img class="song-artwork w-40 h-40 rounded-2xl cursor-pointer" src="https://placehold.co/200x200" class="cursor-pointer" alt="">
                <div class="px-5">
                    <p class="">Song name ....</p>
                    <p>artist...</p>
                </div>
            </div>
        </div>
    </div>
     <div class="fixed bottom-0 w-full bg-[#F5F5F5]">
        <div class="px-5 py-7 flex justify-between">
            <div class="flex text-sm gap-1 rounded-2xl px-2 cursor-pointer" onclick="window.location.href='index.html'">
                <svg width="20px" height="20px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 12.2039V13.725C22 17.6258 22 19.5763 20.8284 20.7881C19.6569 22 17.7712 22 14 22H10C6.22876 22 4.34315 22 3.17157 20.7881C2 19.5763 2 17.6258 2 13.725V12.2039C2 9.91549 2 8.77128 2.5192 7.82274C3.0384 6.87421 3.98695 6.28551 5.88403 5.10813L7.88403 3.86687C9.88939 2.62229 10.8921 2 12 2C13.1079 2 14.1106 2.62229 16.116 3.86687L18.116 5.10812C20.0131 6.28551 20.9616 6.87421 21.4808 7.82274" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M15 18H9" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <p>Home</p>
            </div>
            <div class="cursor-pointer" onclick="window.location.href='song-list.html'">
                <svg width="20px" height="20px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7.24 2H5.34C3.15 2 2 3.15 2 5.33V7.23C2 9.41 3.15 10.56 5.33 10.56H7.23C9.41 10.56 10.56 9.41 10.56 7.23V5.33C10.57 3.15 9.42 2 7.24 2Z" fill="#292D32"/>
                <path opacity="0.4" d="M18.6695 2H16.7695C14.5895 2 13.4395 3.15 13.4395 5.33V7.23C13.4395 9.41 14.5895 10.56 16.7695 10.56H18.6695C20.8495 10.56 21.9995 9.41 21.9995 7.23V5.33C21.9995 3.15 20.8495 2 18.6695 2Z" fill="#292D32"/>
                <path d="M18.6695 13.4302H16.7695C14.5895 13.4302 13.4395 14.5802 13.4395 16.7602V18.6602C13.4395 20.8402 14.5895 21.9902 16.7695 21.9902H18.6695C20.8495 21.9902 21.9995 20.8402 21.9995 18.6602V16.7602C21.9995 14.5802 20.8495 13.4302 18.6695 13.4302Z" fill="#292D32"/>
                <path opacity="0.4" d="M7.24 13.4302H5.34C3.15 13.4302 2 14.5802 2 16.7602V18.6602C2 20.8502 3.15 22.0002 5.33 22.0002H7.23C9.41 22.0002 10.56 20.8502 10.56 18.6702V16.7702C10.57 14.5802 9.42 13.4302 7.24 13.4302Z" fill="#292D32"/>
                </svg>
            </div>
            <div class="cursor-pointer">
                <svg id="wishlist" width="20px" height="20px" viewBox="0 0 24 24" id="favourite-alt" data-name="Line Color" xmlns="http://www.w3.org/2000/svg" class="icon line-color">
                    <path id="primary" fill="currentColor" d="M21,9c0,8.18-9,12-9,12S3,17.22,3,9A4.79,4.79,0,0,1,7.5,4,4.79,4.79,0,0,1,12,9a4.79,4.79,0,0,1,4.5-5A4.79,4.79,0,0,1,21,9Z" style="fill: red; stroke: rgb(183, 25, 25); stroke-linecap: round; stroke-linejoin: round; stroke-width: 2;"></path>
                </svg>
            </div>
            <div class="cursor-pointer">
                <svg width="20px" height="20px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 21C5 17.134 8.13401 14 12 14C15.866 14 19 17.134 19 21M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </div>
    <script>
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        let box = document.getElementById('song-list');

        box.innerHTML = wishlist.map(song => `
        <div class="flex items-center justify-between pb-2 hover:bg-gray-100 transition-colors p-2 rounded-xl cursor-pointer" onclick="window.location.href='single-song.html?id=${song.id}'">
                        <div class="flex items-center">
                            <img src="${song.img}" class="rounded-lg w-12 h-12 object-cover shadow-sm">
                            <div class="pl-3">
                                <p class="font-medium text-sm text-gray-800 truncate w-48">${song.name}</p>
                                <p class="text-xs text-gray-500 truncate w-48">${song.artist}</p>
                            </div>
                        </div>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#1C274C" class="cursor-pointer">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"></path>
                        </svg>
                    </div>`).join('');
    </script>
</body>
</html>
